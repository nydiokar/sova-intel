<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sova Intel API — Documentation</title>
    <meta name="description" content="Interactive API reference for the Sova Intel on-chain Solana intelligence API. Wallet profiles, PnL, holder maps, similarity scoring." />
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0f;
        color: #e0e0e8;
      }

      .hero {
        background: linear-gradient(135deg, #0a0a0f 0%, #12122a 50%, #0a0a0f 100%);
        border-bottom: 1px solid #1e1e3a;
        padding: 2.5rem 2rem 2rem;
        text-align: center;
      }

      .hero-logo {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #fff;
        margin-bottom: 0.4rem;
      }

      .hero-logo span {
        color: #7c6af7;
      }

      .hero-tagline {
        color: #7a7a9a;
        font-size: 0.95rem;
        margin-bottom: 1.4rem;
      }

      .hero-links {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .hero-links a {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 1.1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
      }

      .btn-primary {
        background: #7c6af7;
        color: #fff;
      }
      .btn-primary:hover { background: #6a59e0; }

      .btn-secondary {
        background: #1a1a2e;
        color: #a0a0c0;
        border: 1px solid #2a2a4a;
      }
      .btn-secondary:hover { background: #22223a; color: #e0e0f0; }

      /* Swagger UI overrides for dark theme */
      #swagger-ui {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem 3rem;
      }

      .swagger-ui { background: transparent; }
      .swagger-ui .topbar { display: none; }

      .swagger-ui .info { margin: 2rem 0 1rem; }
      .swagger-ui .info .title { color: #e0e0f0 !important; font-size: 1.6rem; }
      .swagger-ui .info .description p,
      .swagger-ui .info .description li,
      .swagger-ui .info .description td,
      .swagger-ui .info .description th { color: #a0a0c0 !important; }
      .swagger-ui .info .description h2 { color: #c0c0e0 !important; font-size: 1rem; margin: 1rem 0 0.4rem; }
      .swagger-ui .info a { color: #7c6af7 !important; }

      .swagger-ui .opblock-tag { color: #c0c0e0 !important; border-bottom: 1px solid #1e1e3a !important; }
      .swagger-ui .opblock-tag:hover { background: #12122a !important; }
      .swagger-ui .opblock-tag small { color: #7a7a9a !important; }

      .swagger-ui .opblock { background: #11111e !important; border: 1px solid #1e1e3a !important; border-radius: 6px; margin-bottom: 0.5rem; }
      .swagger-ui .opblock .opblock-summary { border-bottom: 1px solid #1e1e3a !important; }
      .swagger-ui .opblock .opblock-summary-method { border-radius: 4px; font-weight: 700; min-width: 60px; }
      .swagger-ui .opblock .opblock-summary-path { color: #d0d0e8 !important; }
      .swagger-ui .opblock .opblock-summary-description { color: #8080a0 !important; }

      .swagger-ui .opblock.opblock-get .opblock-summary-method { background: #1a3a5c; color: #61b3f0; }
      .swagger-ui .opblock.opblock-post .opblock-summary-method { background: #1a3a1a; color: #7fd97f; }
      .swagger-ui .opblock.opblock-get { border-left: 3px solid #61b3f0 !important; }
      .swagger-ui .opblock.opblock-post { border-left: 3px solid #7fd97f !important; }

      .swagger-ui .opblock-body { background: #0e0e1a !important; }
      .swagger-ui .opblock-description-wrapper p { color: #a0a0c0 !important; }

      .swagger-ui section.models { background: #11111e !important; border: 1px solid #1e1e3a !important; border-radius: 6px; }
      .swagger-ui section.models h4 { color: #c0c0e0 !important; }
      .swagger-ui .model-box { background: #0e0e1a !important; }
      .swagger-ui .model { color: #c0c0e0 !important; }
      .swagger-ui .model-title { color: #7c6af7 !important; }

      .swagger-ui .btn { border-radius: 5px; font-weight: 500; }
      .swagger-ui .btn.execute { background: #7c6af7 !important; border-color: #7c6af7 !important; color: #fff !important; }
      .swagger-ui .btn.execute:hover { background: #6a59e0 !important; }
      .swagger-ui .btn.cancel { background: #2a1a1a !important; border-color: #5a2a2a !important; color: #f07070 !important; }

      .swagger-ui input, .swagger-ui textarea, .swagger-ui select {
        background: #0e0e1a !important;
        border-color: #2a2a4a !important;
        color: #d0d0e8 !important;
        border-radius: 4px;
      }

      .swagger-ui .scheme-container { background: #0e0e1a !important; border-bottom: 1px solid #1e1e3a; padding: 1rem; }
      .swagger-ui .auth-wrapper { background: #11111e !important; }
      .swagger-ui .dialog-ux .modal-ux { background: #11111e !important; border: 1px solid #2a2a4a; border-radius: 8px; }
      .swagger-ui .dialog-ux .modal-ux-header { background: #0e0e1a !important; border-bottom: 1px solid #1e1e3a; }
      .swagger-ui .dialog-ux .modal-ux-header h3 { color: #e0e0f0 !important; }
      .swagger-ui .dialog-ux .modal-ux-content { color: #a0a0c0 !important; }

      .swagger-ui .highlight-code { background: #0e0e1a !important; border: 1px solid #1e1e3a; border-radius: 4px; }
      .swagger-ui .microlight { color: #c0c0e0 !important; }

      .swagger-ui .parameter__name { color: #c0c0e0 !important; }
      .swagger-ui .parameter__type { color: #7c6af7 !important; }
      .swagger-ui .parameter__in { color: #7a7a9a !important; }
      .swagger-ui table thead tr th { color: #8080a0 !important; border-bottom: 1px solid #1e1e3a !important; }
      .swagger-ui table tbody tr td { color: #c0c0e0 !important; border-bottom: 1px solid #16162a !important; }

      .swagger-ui .response-col_status { color: #7fd97f !important; }
      .swagger-ui .response-col_description { color: #a0a0c0 !important; }
      .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5 { color: #c0c0e0 !important; }

      .swagger-ui .markdown p, .swagger-ui .markdown li { color: #a0a0c0 !important; }
      .swagger-ui .markdown code { background: #0e0e1a !important; color: #c0c0e0 !important; border: 1px solid #1e1e3a; border-radius: 3px; padding: 1px 4px; }
      .swagger-ui .markdown pre { background: #0e0e1a !important; border: 1px solid #1e1e3a; border-radius: 4px; }

      .swagger-ui .servers > label select { background: #0e0e1a !important; color: #d0d0e8 !important; }
      .swagger-ui .servers > label { color: #8080a0 !important; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0a0a0f; }
      ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="hero-logo">Sova<span>Intel</span> API</div>
      <div class="hero-tagline">On-chain intelligence for Solana — wallet profiles, PnL, holder maps, similarity scoring</div>
      <div class="hero-links">
        <a class="btn-primary" href="https://www.npmjs.com/package/@sova-intel/sdk" target="_blank">
          npm install @sova-intel/sdk
        </a>
        <a class="btn-secondary" href="https://github.com/nydiokar/sova-intel" target="_blank">
          GitHub
        </a>
      </div>
    </div>

    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function () {
        SwaggerUIBundle({
          url: "./openapi.yaml",
          dom_id: "#swagger-ui",
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "StandaloneLayout",
          deepLinking: true,
          defaultModelsExpandDepth: 1,
          defaultModelExpandDepth: 2,
          displayRequestDuration: true,
          tryItOutEnabled: false,
          syntaxHighlight: {
            activate: true,
            theme: "monokai",
          },
        });
      };
    </script>
  </body>
</html>
